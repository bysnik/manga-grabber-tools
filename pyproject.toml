[tool.poetry]
name = "manga-grabber-tools"
version = "0.1.0"
description = "CLI wrapper for manga-grabber with batch download support"
authors = ["Nikita Bystrov <bystrovno@basealt.ru>"]
readme = "README.md"
license = "MIT"
packages = [
    { include = "manga_grabber" },
]

# 🔥 Отключаем режим пакета (если не публикуем в PyPI)
package-mode = false

[tool.poetry.dependencies]
python = ">=3.10"
aiohttp = "*"
beautifulsoup4 = "*"
fpdf2 = "*"
pillow = "*"
natsort = "*"
fonttools = "*"
ebooklib = "*"
click = "*"

[tool.poetry.group.dev.dependencies]
black = "*"
mypy = "*"
types-beautifulsoup4 = "*"
types-fpdf2 = "*"
pytest-timeout = "^2.4.0"

[tool.poetry.group.test.dependencies]
pytest = "*"
pytest-asyncio = "*"
coverage = "*"

# 🔥 poetry-dynamic-versioning (если нужно авто-версионирование)
[tool.poetry-dynamic-versioning]
enable = false  # ⚠️ Отключено для простоты CI
bump = true
style = "pep440"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

# Настройки pytest
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
timeout = 300
filterwarnings = [
    "ignore::DeprecationWarning",
]

# Настройки black
[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312', 'py313']

# Настройки mypy
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

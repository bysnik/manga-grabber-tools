[project]
name = "manga-grabber-tools"
description = "A simple manga/ranobe downloader written in Python"
dynamic = ["version"]
authors = [
    {name = "Nikita Bystrov", email = "bystrovno@basealt.ru"}
]
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "beautifulsoup4",
    "fpdf2",
    "pillow",
    "natsort",
    "fonttools",
    "ebooklib",
    "click",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Framework :: aiohttp",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet",
    "Topic :: Software Development :: Libraries :: Python Modules"
]

[project.scripts]
mangagrabber = "manga_grabber.main:main"

# 🔥 Poetry-specific настройки (только зависимости и плагины)
[tool.poetry]
package-mode = false

[tool.poetry.group.dev.dependencies]
black = "*"
mypy = "*"
types-beautifulsoup4 = "*"
types-fpdf2 = "*"
pytest-timeout = "^2.4.0"

[tool.poetry.group.test.dependencies]
pytest = "*"
pytest-asyncio = "*"
coverage = "*"

# 🔥 poetry-dynamic-versioning (для авто-версий из git-тегов)
[tool.poetry-dynamic-versioning]
enable = true
bump = true
style = "pep440"

[build-system]
requires = ["poetry-core>=1.0.0", "poetry-dynamic-versioning>=1.0.0,<2.0.0"]
build-backend = "poetry_dynamic_versioning.backend"

# Настройки pytest
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
timeout = 300
filterwarnings = [
    "ignore::DeprecationWarning",
]

# Настройки black
[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312', 'py313']

# Настройки mypy
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
